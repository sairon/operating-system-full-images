partition hassos-boot {
	partition-type = 0xc
	bootable = "yes"
	image = "hassos-boot.img"
}

partition hassos-kernel0 {
	partition-type = 0x83
	image = "hassos-kernel0.img"
}

partition hassos-system0 {
	partition-type = 0x83
	image = "hassos-system0.img"
}

partition hassos-kernel1 {
	partition-type = 0x83
	size = ${KERNEL_SIZE}
}

partition hassos-system1 {
	partition-type = 0x83
	size = ${SYSTEM_SIZE}
}

partition hassos-bootstate {
	partition-type = 0x83
	size = ${BOOTSTATE_SIZE}
}

partition hassos-overlay {
	partition-type = 0x83
	image = "hassos-overlay.img"
	forced-primary = "yes"
}

partition hassos-data {
	partition-type = 0x83
	image = "hassos-data.img"
	forced-primary = "yes"
}
